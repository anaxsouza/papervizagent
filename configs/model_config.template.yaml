# Google Cloud / Vertex AI settings
google_cloud:
  project_id: "" # Your Google Cloud Project ID
  location: "global" # e.g. "us-central1" or "global"
  
# API Keys (alternatives to Application Default Credentials)
api_keys:
  google_api_key: "" # Keep empty in git; set via env var or local untracked override
  openai_api_key: ""
  anthropic_api_key: ""
  
# Anthropic Vertex Settings (if you want to use Anthropic via Vertex)
anthropic:
  region: "us-central1"
  project_id: "" # Leave empty to use google_cloud.project_id
